kind = "web"
previewPath = "/"
title = "SantaDirectory"
version = "1.0.0"
id = "artifacts/santa-directory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22854
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/santa-directory run dev"

[services.env]
PORT = "22854"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/santa-directory", "run", "build"]
publicDir = "artifacts/santa-directory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
